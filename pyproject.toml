[project]
name = "waywarden"
version = "0.1.0"
description = "EA-first agent harness"
readme = "README.md"
requires-python = ">=3.13,<3.14"
dependencies = [
  "fastapi==0.135.3",
  "uvicorn[standard]==0.44.0",
  "pydantic==2.13.0",
  "pydantic-settings==2.11.0",
  "sqlalchemy==2.0.49",
  "alembic==1.18.4",
  "psycopg[binary]==3.2.12",
  "httpx==0.28.1",
  "orjson==3.11.3",
  "pyyaml==6.0.3",
  "honcho-ai==2.1.1",
]

[project.optional-dependencies]
dev = [
  "pytest==9.0.3",
  "pytest-asyncio==1.2.0",
  "ruff==0.15.10",
  "mypy==1.18.2",
]

[tool.uv]
package = true

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.13"
strict = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
