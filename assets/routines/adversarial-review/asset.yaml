id: adversarial-review
kind: routine
version: 1.0.0
description: Pipeline checkpoint routine that detects adversarial handback findings and gates approval-aware review outcomes.
tags:
  - coding
  - routine
  - review
  - adversarial
required_providers:
  - model
  - tool
milestones:
  - phase: review
    names:
      - findings_recorded
    checkpoint: review-gate
    gates:
      - continue
      - abort
      - branch
emits_events:
  - run.progress
  - run.approval_waiting
documentation_refs:
  - docs/runbooks/adversarial-review-checklist.md
profile_filter:
  - op: include
    tag: coding
