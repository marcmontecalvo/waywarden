name: Bug
description: Report a defect with enough detail to reproduce it.
title: "[Bug]: "
labels:
  - needs-triage
body:
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Describe the smallest reliable path to trigger the problem.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: State what should have happened.
      placeholder: Describe the expected result.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: State what actually happened, including errors or logs.
      placeholder: Describe the observed result.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include runtime, host, profile, branch, or other relevant context.
      placeholder: |
        - OS / host:
        - Python:
        - Profile / instance:
        - Commit / branch:
    validations:
      required: true
