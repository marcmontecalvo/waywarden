repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: mypy
        name: mypy (strict, full tree — matches CI)
        entry: uv run mypy --strict src tests
        language: system
        files: ^(src|tests)/.*\.py$
        pass_filenames: false
        require_serial: true
