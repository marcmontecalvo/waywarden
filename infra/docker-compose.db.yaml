services:
  db:
    image: postgres:16.4-alpine
    container_name: waywarden_pg
    environment:
      POSTGRES_USER: waywarden
      POSTGRES_PASSWORD: waywarden
      POSTGRES_DB: waywarden_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - waywarden_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waywarden -d waywarden_dev"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  waywarden_pg_data:
